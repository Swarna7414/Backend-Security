spring:
  application:
    name: auth-server
  mail:
    host: smtp.gmail.com
    port: 587
    username: UserName
    password: Password
  smtp:
    auth: true
  starttls:
    enable: true

  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
jwt:
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

server:
  port: 8080